inferenceProvider: GOOGLE
model: "gemini-3.5-flash"
description: |
  Smoketest mit genau einer Wiederholung für Google Gemini / gemini-3.5-flash. Archetyp: beratend-empfehlende Rundreise. Parameter: temperature=0, topP=1, topK=1, reasoning=off.
analysis:
  promptEvaluation: ADVISORY_RECOMMENDATION_SWISS_ROUND_TRIP
  swissRoundTrip:
    expectedStationCount: 5
    language: IT
  bleu:
    maxN: 4
    smoothingEpsilon: 0.1
  rouge:
    variant: ROUGE_L
    aggregation: F1
run:
  prompt: |
    Prepara un breve itinerario per un viaggio itinerante attraverso la Svizzera con 5 tappe.
    Ogni tappa deve corrispondere esattamente al nome di una singola località, non a una regione né a una combinazione di più località.
    Indica solo le 5 tappe in un ordine logico e, per ciascuna, una breve motivazione della scelta.
  iterations: 1
  temperature: 0
  topP: 1
  topK: 1
  reasoning: "off"
