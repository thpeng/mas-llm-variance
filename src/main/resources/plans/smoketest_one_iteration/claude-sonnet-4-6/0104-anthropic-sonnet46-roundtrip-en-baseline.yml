inferenceProvider: ANTHROPIC
model: "claude-sonnet-4-6"
description: |
  Smoketest mit genau einer Wiederholung für Anthropic / claude-sonnet-4-6. Archetyp: beratend-empfehlende Rundreise. Parameter: temperature=0, topK=1, reasoning=off.
analysis:
  promptEvaluation: ADVISORY_RECOMMENDATION_SWISS_ROUND_TRIP
  swissRoundTrip:
    expectedStationCount: 5
    language: EN
  bleu:
    maxN: 4
    smoothingEpsilon: 0.1
  rouge:
    variant: ROUGE_L
    aggregation: F1
run:
  prompt: |
    Create a brief itinerary for a multi-stop tour of Switzerland with 5 stops.
    Each stop must be exactly one specific place name, not a region or a combination of multiple places.
    List only the 5 stops in a logical order and provide one brief reason for each choice.
  iterations: 1
  temperature: 0
  topK: 1
  reasoning: "off"
